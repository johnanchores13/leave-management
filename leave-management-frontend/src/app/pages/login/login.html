<div class="login-card">
    <p class="login-subtitle">Portale gestione ferie</p>

    <div *ngIf="errore" class="error-msg">{{ errore }}</div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" />
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" (keyup.enter)="login()" />
    </div>

    <button class="btn-login" (click)="login()">Accedi</button>
</div>
